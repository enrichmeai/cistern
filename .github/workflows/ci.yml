name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: mvn -q -B verify

  # T3.1 wires the conformance harness in here (report-only), T3.2 turns it into the
  # ratchet gate against cth/BASELINE.md. Keep this stub so the job name is reserved.
  conformance:
    runs-on: ubuntu-latest
    needs: build
    if: false   # enable in T3.1
    steps:
      - run: echo "CTH job — implemented in T3.1"
