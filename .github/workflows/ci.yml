name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same PR; never cancel runs on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: mvn -q -B verify

  # T3.1: run the conformance harness and publish what it found. Report-only by
  # design — this job must never fail the build. T3.2 turns the numbers into the
  # ratchet gate against cth/BASELINE.md.
  #
  # Expect 0 passed / 0 failed / 41 untested until T5.4. The harness has no
  # unauthenticated run mode: it authenticates alice and bob before executing any
  # feature, so today it stops during setup and emits no results report at all.
  # That is the recorded baseline, not a broken job.
  conformance:
    name: conformance (report-only)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build the server jar
        run: mvn -q -B -DskipTests -pl cistern-app -am package

      - name: Start Cistern
        env:
          CISTERN_STORAGE_ROOT: ${{ runner.temp }}/cistern-data
          # The harness calls the host by this name from inside its container, and
          # cistern.base-url is what mints Location headers and the storage
          # description. These two must agree or nothing the server returns matches.
          CISTERN_BASE_URL: http://host.docker.internal:3000
        run: |
          mkdir -p "$CISTERN_STORAGE_ROOT"
          nohup java -jar cistern-app/target/cistern-app-*.jar \
            > "${{ runner.temp }}/server.log" 2>&1 &
          echo $! > "${{ runner.temp }}/server.pid"
          # Any HTTP response means up — the storage root legitimately 404s pre-T5.4.
          # On a connection failure curl BOTH prints 000 and exits non-zero, so a
          # `|| echo 000` fallback yields "000000", which is != "000" and reports a
          # dead server as ready on the first attempt. Let the assignment carry the
          # status instead.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 http://localhost:3000/ 2>/dev/null) || code=000
            if [ "$code" != "000" ]; then
              echo "server up (HTTP $code) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::server did not answer on :3000 within 60s"
          cat "${{ runner.temp }}/server.log"
          exit 1

      - name: Run the harness
        id: cth
        run: |
          set +e
          ./cth/run-cth.sh > "${{ runner.temp }}/cth-full.log" 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          ./cth/run-cth.sh --coverage > "${{ runner.temp }}/cth-coverage.log" 2>&1
          set -e
          # Report-only (T3.1): the harness's exit code is data, not a verdict.
          exit 0

      - name: Publish summary
        if: always()
        run: |
          ./cth/summarize.sh \
            "${{ runner.temp }}/cth-full.log" \
            cth/reports \
            "${{ steps.cth.outputs.exit_code }}" \
            "${{ runner.temp }}/cth-coverage.log" >> "$GITHUB_STEP_SUMMARY"

      # Collect the logs alongside the reports so the artifact has one predictable
      # root. Mixing relative and absolute paths in upload-artifact makes the least
      # common ancestor /home/runner/work, which buries everything under _temp/.
      - name: Collect logs
        if: always()
        run: cp "${{ runner.temp }}"/*.log cth/reports/ || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cth-reports
          path: cth/reports/
          if-no-files-found: warn

      - name: Stop Cistern
        if: always()
        run: kill "$(cat '${{ runner.temp }}/server.pid')" 2>/dev/null || true
