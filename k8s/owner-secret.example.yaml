# The pod owner's identity and credential. Copy, change BOTH values, apply, and never
# commit the result:
#
#   cp k8s/owner-secret.example.yaml /tmp/cistern-owner.yaml
#   # edit it
#   kubectl apply -f /tmp/cistern-owner.yaml
#
# Or straight from the command line, which keeps the token out of a file entirely:
#
#   kubectl create secret generic cistern-owner -n cistern \
#     --from-literal=web-id='https://you.example/profile/card#me' \
#     --from-literal=token="$(openssl rand -hex 32)"
#
# Setting these turns enforcement ON. Without the secret the Deployment will not start —
# deliberately: a pod that silently ran without an authorization layer because a secret
# was missing is exactly the failure this is meant to prevent.
apiVersion: v1
kind: Secret
metadata:
  name: cistern-owner
  namespace: cistern
type: Opaque
stringData:
  # The WebID the credential authenticates as. It does not need to resolve for local use.
  web-id: "https://you.example/profile/card#me"
  # A shared secret, NOT a Solid-OIDC token. Generate a real one; do not ship this value.
  token: "change-me-openssl-rand-hex-32"
